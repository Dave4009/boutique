<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier & Paiement | Dave Deliscart</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold:#d4af37; --black-deep:#0a0a0a; --black-surface:#141414; --black-card:#1a1a1a; --white:#fff; --grey:#888; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--black-deep); color:var(--white); font-family:'Inter',sans-serif; min-height:100vh; }
        h1,h2,h3 { font-family:'Playfair Display',serif; }

        header {
            background:rgba(10,10,10,0.97); border-bottom:1px solid rgba(212,175,55,0.15);
            padding:1.2rem 5%; display:flex; justify-content:space-between; align-items:center;
        }
        .logo { display:flex; align-items:center; gap:10px; font-size:1.3rem; font-weight:700; letter-spacing:3px; text-decoration:none; color:var(--white); }
        .logo span { color:var(--gold); }
        .logo-mark {
            display:inline-flex; align-items:center; justify-content:center;
            width:30px; height:30px; border-radius:50%; flex-shrink:0;
            border:1px solid rgba(212,175,55,0.55);
            background:radial-gradient(circle at 35% 30%, rgba(212,175,55,0.18), transparent 70%), var(--black-card);
            color:var(--gold); font-family:'Playfair Display',serif; font-weight:700;
            font-size:0.65rem; letter-spacing:0;
        }

        .page-title { text-align:center; padding:3rem 20px 2rem; }
        .page-title h1 { font-size:2.2rem; letter-spacing:2px; margin-bottom:0.5rem; }
        .page-title p { color:var(--grey); font-size:0.9rem; }
        .gold-line { width:40px; height:1px; background:var(--gold); margin:1rem auto 0; }

        .checkout-layout {
            max-width:900px; margin:0 auto; padding:0 20px 5rem;
            display:grid; grid-template-columns:1fr 340px; gap:30px;
        }

        .card {
            background:var(--black-card);
            border:1px solid rgba(255,255,255,0.06);
            padding:2rem;
        }
        .card-title { font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--gold); margin-bottom:1.5rem; }
        .customer-card {
            background:rgba(212,175,55,0.06); border:1px solid rgba(212,175,55,0.18);
            padding:1rem; margin-bottom:1rem; color:rgba(255,255,255,0.85); font-size:0.82rem; line-height:1.7;
        }
        .customer-card strong { color:var(--gold); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:6px; }
        .customer-card a { color:var(--gold); text-decoration:none; font-size:0.76rem; display:inline-flex; align-items:center; gap:5px; margin-top:7px; }

        /* ITEMS LIST */
        .checkout-item {
            display:flex; gap:15px; padding:1.2rem 0;
            border-bottom:1px solid rgba(255,255,255,0.05);
        }
        .checkout-item:last-child { border-bottom:none; }
        .checkout-item img { width:70px; height:85px; object-fit:cover; border-radius:2px; flex-shrink:0; }
        .checkout-item-info { flex:1; }
        .checkout-item-info h4 { font-size:1rem; margin-bottom:4px; }
        .checkout-item-info .cat { color:var(--gold); font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
        .checkout-item-info .desc { color:var(--grey); font-size:0.8rem; line-height:1.5; }
        .checkout-item-price { font-size:1.1rem; font-weight:700; color:var(--gold); text-align:right; }

        .btn-remove-item {
            display:inline-flex; align-items:center; gap:4px;
            color:#ff4d4d; font-size:0.72rem; cursor:pointer; margin-top:8px;
        }
        .btn-remove-item:hover { text-decoration:underline; }

        /* SUMMARY */
        .summary-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.9rem; }
        .summary-row:last-of-type { border:none; }
        .summary-total { display:flex; justify-content:space-between; padding:15px 0 20px; font-size:1.3rem; font-weight:700; }
        .summary-total span:last-child { color:var(--gold); }

        .secure-badge {
            display:flex; align-items:center; gap:8px; font-size:0.72rem; color:var(--grey);
            background:rgba(212,175,55,0.05); border:1px solid rgba(212,175,55,0.15);
            padding:10px 14px; margin-bottom:15px;
        }
        .secure-badge i { color:var(--gold); }

        /* BOUTONS DE PAIEMENT PAR PRODUIT */
        .pay-buttons { display:flex; flex-direction:column; gap:10px; }

        .btn-pay {
            display:flex; align-items:center; justify-content:space-between;
            background:var(--gold); color:var(--black-deep);
            border:none; padding:14px 18px; cursor:pointer; font-weight:700;
            font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;
            text-decoration:none; transition:background 0.3s;
            width:100%; font-family:'Inter',sans-serif;
        }
        .btn-pay:hover { background:#fff; }
        .btn-pay .item-name { font-size:0.78rem; font-weight:400; opacity:0.8; }

        .pay-note { font-size:0.72rem; color:var(--grey); text-align:center; margin-top:12px; line-height:1.6; }

        .btn-back {
            display:inline-flex; align-items:center; gap:6px;
            color:var(--grey); font-size:0.82rem; text-decoration:none;
            margin-bottom:2rem; transition:color 0.2s;
        }
        .btn-back:hover { color:var(--gold); }

        .empty-checkout { text-align:center; padding:4rem; color:var(--grey); }
        .empty-checkout i { font-size:3rem; opacity:0.2; display:block; margin-bottom:1rem; }

        @media(max-width:700px) {
            .checkout-layout { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><span class="logo-mark">DD</span>DAVE <span>DELISCART</span></a>
</header>

<div class="page-title">
    <h1>Votre Panier</h1>
    <p>Vérifiez vos articles avant de payer</p>
    <div class="gold-line"></div>
</div>

<div style="max-width:900px;margin:0 auto;padding:0 20px">
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> Continuer mes achats</a>
</div>

<div class="checkout-layout" id="checkout-layout">
    <!-- contenu injecté par JS -->
</div>

<script>
    const cart = JSON.parse(localStorage.getItem('dd_cart')) || [];
    const customer = JSON.parse(localStorage.getItem('dd_customer')) || null;

    function removeItem(id) {
        const updated = cart.filter(c => String(c.id) !== String(id));
        localStorage.setItem('dd_cart', JSON.stringify(updated));
        window.location.reload();
    }

    function render() {
        const layout = document.getElementById('checkout-layout');

        if (!customer || !customer.email || !customer.phone) {
            localStorage.setItem('dd_after_login', 'checkout_page');
            window.location.href = 'login.html?next=checkout';
            return;
        }

        if (!cart.length) {
            layout.style.gridTemplateColumns = '1fr';
            layout.innerHTML = `
                <div class="empty-checkout">
                    <i class="fas fa-shopping-bag"></i>
                    <p>Votre panier est vide.</p>
                    <a href="index.html" style="color:var(--gold);text-decoration:none;display:inline-block;margin-top:1rem;font-size:0.9rem"><i class="fas fa-arrow-left" style="margin-right:6px"></i>Retour à la boutique</a>
                </div>`;
            return;
        }

        const total = cart.reduce((s, i) => s + parseFloat(i.price), 0);

        // Colonne gauche : liste des articles
        const itemsHTML = cart.map(item => `
            <div class="checkout-item">
                <img src="${item.image}" alt="${item.name}" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA0MDAgNTAwIj4KICA8ZGVmcz4KICAgIDxsaW5lYXJHcmFkaWVudCBpZD0iYmciIHgxPSIwIiB5MT0iMCIgeDI9IjEiIHkyPSIxIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwJSIgc3RvcC1jb2xvcj0iIzBhMGEwYSIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiMxYTFhMWEiLz4KICAgIDwvbGluZWFyR3JhZGllbnQ+CiAgICA8cmFkaWFsR3JhZGllbnQgaWQ9Imdsb3ciIGN4PSI1MCUiIGN5PSIzOCUiIHI9IjU1JSI+CiAgICAgIDxzdG9wIG9mZnNldD0iMCUiIHN0b3AtY29sb3I9IiNkNGFmMzciIHN0b3Atb3BhY2l0eT0iMC4yMiIvPgogICAgICA8c3RvcCBvZmZzZXQ9IjEwMCUiIHN0b3AtY29sb3I9IiNkNGFmMzciIHN0b3Atb3BhY2l0eT0iMCIvPgogICAgPC9yYWRpYWxHcmFkaWVudD4KICA8L2RlZnM+CiAgPHJlY3Qgd2lkdGg9IjQwMCIgaGVpZ2h0PSI1MDAiIGZpbGw9InVybCgjYmcpIi8+CiAgPHJlY3Qgd2lkdGg9IjQwMCIgaGVpZ2h0PSI1MDAiIGZpbGw9InVybCgjZ2xvdykiLz4KICA8dGV4dCB4PSIyMDAiIHk9IjI1MCIgZm9udC1mYW1pbHk9Ikdlb3JnaWEsICdUaW1lcyBOZXcgUm9tYW4nLCBzZXJpZiIgZm9udC1zaXplPSIxMTAiIGZvbnQtd2VpZ2h0PSI3MDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0iI2Q0YWYzNyIgc3Ryb2tlLW9wYWNpdHk9IjAuNCIgc3Ryb2tlLXdpZHRoPSIxLjYiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkREPC90ZXh0PgogIDxsaW5lIHgxPSIxNzAiIHkxPSIzMDAiIHgyPSIyMzAiIHkyPSIzMDAiIHN0cm9rZT0iI2Q0YWYzNyIgc3Ryb2tlLW9wYWNpdHk9IjAuNTUiIHN0cm9rZS13aWR0aD0iMS41Ii8+CiAgPHRleHQgeD0iMjAwIiB5PSIzMzAiIGZvbnQtZmFtaWx5PSJHZW9yZ2lhLCBzZXJpZiIgZm9udC1zaXplPSIxMyIgbGV0dGVyLXNwYWNpbmc9IjMiIGZpbGw9IiM4ODgiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkRBVkUgREVMSVNDQVJUPC90ZXh0Pgo8L3N2Zz4='">
                <div class="checkout-item-info">
                    <div class="cat">${item.category}</div>
                    <h4>${item.name}</h4>
                    <div class="desc">${item.description || ''}</div>
                    <span class="btn-remove-item" onclick="removeItem('${item.id}')"><i class="fas fa-trash"></i> Retirer</span>
                </div>
                <div>
                    <div class="checkout-item-price">$${parseFloat(item.price).toFixed(2)}</div>
                    <div style="font-size:0.72rem;color:var(--grey);text-align:right;margin-top:4px">${item.deliverytype === 'digital' ? '<i class="fas fa-download"></i> Digital' : '<i class="fas fa-truck"></i> Physique'}</div>
                </div>
            </div>`).join('');

        // Colonne droite : récapitulatif + boutons de paiement par article
        const summaryRows = cart.map(item =>
            `<div class="summary-row"><span>${item.name}</span><span>$${parseFloat(item.price).toFixed(2)}</span></div>`
        ).join('');

        // Un bouton de paiement Stripe par produit
        const payButtons = cart.map(item => `
            <button class="btn-pay" onclick="preparePayment('${item.id}')">
                <div>
                    <div class="item-name">${item.name}</div>
                    <div>Payer $${parseFloat(item.price).toFixed(2)}</div>
                </div>
                <i class="fas fa-arrow-right"></i>
            </button>`).join('');

        layout.innerHTML = `
            <div class="card">
                <div class="card-title"><i class="fas fa-box" style="margin-right:6px"></i>Articles (${cart.length})</div>
                ${itemsHTML}
            </div>
            <div>
                <div class="card">
                    <div class="card-title">Récapitulatif</div>
                    <div class="customer-card">
                        <strong>Client</strong>
                        ${customer.name ? `${customer.name}<br>` : ''}
                        ${customer.email}<br>
                        ${customer.phone}
                        <br><a href="login.html"><i class="fas fa-pen"></i> Modifier mes infos</a>
                    </div>
                    ${summaryRows}
                    <div class="summary-total">
                        <span>Total</span>
                        <span>$${total.toFixed(2)}</span>
                    </div>
                    <div class="secure-badge">
                        <i class="fas fa-shield-alt"></i>
                        <span>Paiement 100% sécurisé via Stripe</span>
                    </div>
                    <div class="pay-buttons">
                        ${payButtons}
                    </div>
                    <p class="pay-note">Chaque article possède son propre lien de paiement Stripe sécurisé. Cliquez sur le bouton correspondant à l'article que vous souhaitez payer.</p>
                </div>
            </div>`;
    }

    function preparePayment(id) {
        const item = cart.find(i => String(i.id) === String(id));
        if (!item?.stripepaymentlink) {
            alert('Lien de paiement manquant pour ce produit.');
            return;
        }
        localStorage.setItem('dd_last_order', JSON.stringify(cart));
        localStorage.setItem('dd_last_customer', JSON.stringify(customer));
        window.location.href = item.stripepaymentlink;
    }

    render();
</script>
</body>
</html>
