<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | DD</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold:#d4af37; --black-deep:#0a0a0a; --black-surface:#141414; --black-card:#1a1a1a; --white:#fff; --grey:#888; --red:#e74c3c; --green:#2ecc71; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--black-deep); color:var(--white); font-family:'Inter',sans-serif; }
        h1,h2,h3 { font-family:'Playfair Display',serif; }

        /* ─── LOGIN SCREEN ─── */
        #login-screen {
            position:fixed; inset:0; background:var(--black-deep);
            display:flex; align-items:center; justify-content:center;
            z-index:9999; flex-direction:column; gap:0;
        }
        .login-box {
            background:var(--black-card); border:1px solid rgba(212,175,55,0.2);
            padding:3rem; width:100%; max-width:420px;
        }
        .login-logo { display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Playfair Display',serif; font-size:1.4rem; letter-spacing:3px; text-align:center; margin-bottom:2rem; }
        .login-logo span { color:var(--gold); }
        .login-title { font-size:0.8rem; text-transform:uppercase; letter-spacing:2px; color:var(--gold); text-align:center; margin-bottom:2rem; }
        .login-error { background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.3); color:#e74c3c; padding:10px 14px; font-size:0.82rem; margin-bottom:15px; display:none; }

        /* ─── ADMIN LAYOUT ─── */
        #admin-app { display:none; min-height:100vh; }

        header {
            background:rgba(10,10,10,0.98); border-bottom:1px solid rgba(212,175,55,0.15);
            padding:1.2rem 2rem; display:flex; justify-content:space-between; align-items:center;
            position:sticky; top:0; z-index:100;
        }
        .logo { display:flex; align-items:center; gap:10px; font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; letter-spacing:3px; text-decoration:none; color:var(--white); }
        .logo span { color:var(--gold); }
        .logo-mark {
            display:inline-flex; align-items:center; justify-content:center;
            width:30px; height:30px; border-radius:50%; flex-shrink:0;
            border:1px solid rgba(212,175,55,0.55);
            background:radial-gradient(circle at 35% 30%, rgba(212,175,55,0.18), transparent 70%), var(--black-card);
            color:var(--gold); font-family:'Playfair Display',serif; font-weight:700;
            font-size:0.65rem; letter-spacing:0;
        }
        .header-right { display:flex; align-items:center; gap:15px; }
        .admin-badge { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--gold); background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.2); padding:4px 10px; border-radius:2px; }
        #user-email { font-size:0.78rem; color:var(--grey); }

        .btn-logout {
            background:transparent; border:1px solid rgba(255,255,255,0.1);
            color:var(--grey); padding:6px 14px; cursor:pointer;
            font-size:0.75rem; text-transform:uppercase; letter-spacing:1px;
            transition:all 0.3s;
        }
        .btn-logout:hover { border-color:var(--red); color:var(--red); }

        .main-layout { display:grid; grid-template-columns:380px 1fr; gap:0; min-height:calc(100vh - 65px); }

        /* ─── SIDEBAR FORM ─── */
        .sidebar {
            background:var(--black-surface); border-right:1px solid rgba(255,255,255,0.05);
            padding:2rem; overflow-y:auto; height:calc(100vh - 65px); position:sticky; top:65px;
        }
        .sidebar-section { margin-bottom:2rem; }
        .section-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; color:var(--gold); margin-bottom:1.2rem; padding-bottom:0.8rem; border-bottom:1px solid rgba(212,175,55,0.15); }

        .form-group { margin-bottom:1.2rem; }
        label { display:block; font-size:0.75rem; color:var(--grey); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
        input, textarea, select {
            width:100%; padding:11px 14px;
            background:#0d0d0d; border:1px solid rgba(255,255,255,0.1);
            color:var(--white); font-family:'Inter',sans-serif; font-size:0.88rem;
            border-radius:2px; outline:none; transition:border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus { border-color:var(--gold); }
        textarea { resize:vertical; min-height:80px; }
        select option { background:#1a1a1a; }

        .cat-row { display:flex; gap:8px; }
        .cat-row select { flex:1; }
        .btn-add-cat {
            width:42px; height:42px; flex-shrink:0;
            background:transparent; border:1px solid rgba(212,175,55,0.3);
            color:var(--gold); cursor:pointer; font-size:1rem; transition:all 0.3s;
            display:flex; align-items:center; justify-content:center; border-radius:2px;
        }
        .btn-add-cat:hover { background:var(--gold); color:var(--black-deep); }

        .delivery-toggle { display:flex; gap:0; margin-bottom:1.2rem; }
        .delivery-opt {
            flex:1; padding:10px; text-align:center; cursor:pointer; font-size:0.78rem;
            text-transform:uppercase; letter-spacing:1px; border:1px solid rgba(255,255,255,0.1);
            background:transparent; color:var(--grey); transition:all 0.3s;
        }
        .delivery-opt.active { background:var(--gold); color:var(--black-deep); border-color:var(--gold); font-weight:600; }

        .btn-submit {
            width:100%; padding:14px; background:var(--gold); color:var(--black-deep);
            border:none; font-weight:700; font-size:0.85rem; text-transform:uppercase;
            letter-spacing:2px; cursor:pointer; transition:background 0.3s; margin-top:0.5rem;
        }
        .btn-submit:hover { background:var(--white); }
        .btn-submit.editing { background:#3498db; }
        .btn-submit.editing:hover { background:#5dade2; }

        .btn-cancel {
            width:100%; padding:11px; background:transparent; color:var(--grey);
            border:1px solid rgba(255,255,255,0.1); font-size:0.8rem; text-transform:uppercase;
            letter-spacing:1px; cursor:pointer; transition:all 0.3s; margin-top:8px; display:none;
        }
        .btn-cancel:hover { border-color:var(--red); color:var(--red); }

        /* IMPORT/EXPORT */
        .io-btns { display:flex; gap:8px; }
        .btn-io {
            flex:1; padding:10px; font-size:0.72rem; text-transform:uppercase;
            letter-spacing:1px; cursor:pointer; border:1px solid rgba(255,255,255,0.1);
            background:transparent; color:var(--grey); transition:all 0.3s; font-weight:600;
        }
        .btn-io.export:hover { border-color:var(--grey); color:var(--white); }
        .btn-io.import:hover { border-color:var(--gold); color:var(--gold); }

        /* ─── MAIN CONTENT ─── */
        .main-content { padding:2rem; overflow:auto; }

        .content-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
        .content-header h2 { font-size:1.3rem; letter-spacing:1px; }
        .product-count { font-size:0.8rem; color:var(--grey); }

        /* STATS */
        .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:2rem; }
        .stat-card { background:var(--black-card); border:1px solid rgba(255,255,255,0.05); padding:1.2rem; }
        .stat-label { font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; color:var(--grey); margin-bottom:6px; }
        .stat-value { font-size:1.6rem; font-weight:700; color:var(--gold); }
        .stat-icon { color:rgba(212,175,55,0.3); font-size:1.2rem; float:right; margin-top:-30px; }

        /* TABLE */
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        thead th {
            padding:12px 15px; text-align:left;
            border-bottom:2px solid rgba(212,175,55,0.2);
            font-size:0.7rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold);
            font-weight:600; white-space:nowrap;
        }
        tbody td { padding:14px 15px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.88rem; vertical-align:middle; }
        tbody tr:hover { background:rgba(255,255,255,0.02); }

        .thumb { width:45px; height:55px; object-fit:cover; border-radius:2px; }
        .product-name-cell { font-weight:600; max-width:180px; }
        .cat-pill {
            display:inline-block; padding:3px 10px; font-size:0.68rem; letter-spacing:1px;
            text-transform:uppercase; border:1px solid rgba(212,175,55,0.3); color:var(--gold);
            border-radius:2px;
        }
        .delivery-pill {
            display:inline-flex; align-items:center; gap:4px;
            font-size:0.72rem; color:var(--grey);
        }
        .price-cell { font-weight:700; color:var(--gold); }
        .stripe-link { font-size:0.72rem; color:var(--grey); font-family:monospace; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; }

        .action-btns { display:flex; gap:6px; }
        .btn-edit {
            background:transparent; border:1px solid rgba(212,175,55,0.3); color:var(--gold);
            padding:6px 11px; cursor:pointer; border-radius:2px; font-size:0.8rem; transition:all 0.3s;
        }
        .btn-edit:hover { background:var(--gold); color:var(--black-deep); }
        .btn-delete {
            background:transparent; border:1px solid rgba(231,76,60,0.3); color:var(--red);
            padding:6px 11px; cursor:pointer; border-radius:2px; font-size:0.8rem; transition:all 0.3s;
        }
        .btn-delete:hover { background:var(--red); color:var(--white); }

        /* EMPTY */
        .table-empty { text-align:center; padding:4rem; color:var(--grey); }
        .table-empty i { font-size:2.5rem; opacity:0.15; display:block; margin-bottom:1rem; }

        /* LOADER */
        .loader { width:28px; height:28px; border:2px solid rgba(212,175,55,0.15); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; margin:3rem auto; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* TOAST */
        .toast {
            position:fixed; bottom:30px; right:30px;
            background:var(--black-card); border-left:3px solid var(--gold);
            color:var(--white); padding:14px 20px; font-size:0.85rem;
            z-index:9999; border-radius:2px; transform:translateX(200%);
            transition:transform 0.4s cubic-bezier(0.165,0.84,0.44,1);
            display:flex; align-items:center; gap:10px; min-width:250px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        .toast.show { transform:translateX(0); }
        .toast.error { border-left-color:var(--red); }
        .toast i { flex-shrink:0; }

        /* FORMS INSIDE LOGIN */
        .field { margin-bottom:1.2rem; }
        .field label { display:block; font-size:0.75rem; color:var(--grey); margin-bottom:6px; }
        .field input { width:100%; padding:12px 14px; background:#0d0d0d; border:1px solid rgba(255,255,255,0.1); color:var(--white); border-radius:2px; outline:none; font-size:0.9rem; transition:border-color 0.3s; }
        .field input:focus { border-color:var(--gold); }
        .btn-login { width:100%; padding:14px; background:var(--gold); color:var(--black-deep); border:none; font-weight:700; font-size:0.9rem; text-transform:uppercase; letter-spacing:2px; cursor:pointer; transition:background 0.3s; }
        .btn-login:hover { background:var(--white); }
        .btn-login:disabled { opacity:0.5; cursor:not-allowed; }

        @media(max-width:1000px) {
            .main-layout { grid-template-columns:1fr; }
            .sidebar { position:static; height:auto; }
            .stats-row { grid-template-columns:repeat(2,1fr); }
        }
    </style>
</head>
<body>

<!-- ─── LOGIN ─── -->
<div id="login-screen">
    <div class="login-box">
        <div class="login-logo"><span class="logo-mark">DD</span>D <span>D</span></div>
        <div class="login-title">Espace Administrateur</div>
        <div class="login-error" id="login-error"></div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="login-email" placeholder="admin@example.com" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <div class="field">
            <label>Mot de passe</label>
            <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn-login" onclick="doLogin()" id="btn-login-submit">
            <i class="fas fa-sign-in-alt" style="margin-right:6px"></i>Se connecter
        </button>
    </div>
</div>

<!-- ─── APP ─── -->
<div id="admin-app">
    <header>
        <a href="index.html" class="logo"><span class="logo-mark">DD</span>D <span>D</span></a>
        <div class="header-right">
            <span class="admin-badge"><i class="fas fa-shield-alt" style="margin-right:4px"></i>Admin</span>
            <span id="user-email"></span>
            <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt" style="margin-right:4px"></i>Déconnexion</button>
        </div>
    </header>

    <div class="main-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="section-label" id="form-section-label">Ajouter un produit</div>

                <div class="form-group">
                    <label>Nom du produit *</label>
                    <input type="text" id="f-name" placeholder="Ex: Transform Your Physique">
                </div>

                <div class="form-group">
                    <label>Catégorie *</label>
                    <div class="cat-row">
                        <select id="f-category"></select>
                        <button class="btn-add-cat" onclick="addCategory()" title="Nouvelle catégorie"><i class="fas fa-plus"></i></button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Prix (USD) *</label>
                    <input type="number" step="0.01" id="f-price" placeholder="24.99">
                </div>

                <div class="form-group">
                    <label>URL image de couverture *</label>
                    <input type="url" id="f-image" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label>Lien Stripe (Payment Link) *</label>
                    <input type="url" id="f-stripe" placeholder="https://buy.stripe.com/...">
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="f-description" rows="3" placeholder="Courte description du produit..."></textarea>
                </div>

                <div class="form-group">
                    <label>Type de livraison</label>
                    <div class="delivery-toggle">
                        <div class="delivery-opt active" id="opt-digital" onclick="setDelivery('digital')"><i class="fas fa-download" style="margin-right:4px"></i>Digital</div>
                        <div class="delivery-opt" id="opt-physical" onclick="setDelivery('physical')"><i class="fas fa-truck" style="margin-right:4px"></i>Physique</div>
                    </div>
                </div>

                <div class="form-group" id="delivery-link-group">
                    <label>Lien de téléchargement</label>
                    <input type="url" id="f-delivery-link" placeholder="https://... (PDF, programme, etc.)">
                </div>

                <button class="btn-submit" id="btn-submit-form" onclick="submitForm()">
                    <i class="fas fa-plus" style="margin-right:6px"></i>Publier sur la boutique
                </button>
                <button class="btn-cancel" id="btn-cancel-form" onclick="cancelEdit()">
                    <i class="fas fa-times" style="margin-right:4px"></i>Annuler
                </button>
            </div>

            <div class="sidebar-section">
                <div class="section-label">Sauvegarde</div>
                <div class="io-btns">
                    <button class="btn-io export" onclick="exportCatalog()"><i class="fas fa-download" style="margin-right:4px"></i>Exporter</button>
                    <button class="btn-io import" onclick="document.getElementById('import-file').click()"><i class="fas fa-upload" style="margin-right:4px"></i>Importer</button>
                    <input type="file" id="import-file" style="display:none" accept=".json" onchange="importCatalog(this)">
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <div class="stats-row" id="stats-row">
                <div class="stat-card"><div class="stat-label">Produits</div><div class="stat-value" id="stat-total">—</div><i class="fas fa-box-open stat-icon"></i></div>
                <div class="stat-card"><div class="stat-label">Digitaux</div><div class="stat-value" id="stat-digital">—</div><i class="fas fa-download stat-icon"></i></div>
                <div class="stat-card"><div class="stat-label">Physiques</div><div class="stat-value" id="stat-physical">—</div><i class="fas fa-truck stat-icon"></i></div>
                <div class="stat-card"><div class="stat-label">Catégories</div><div class="stat-value" id="stat-cats">—</div><i class="fas fa-tags stat-icon"></i></div>
            </div>

            <div class="content-header">
                <h2>Inventaire</h2>
                <span class="product-count" id="product-count"></span>
            </div>

            <div class="table-wrap">
                <div class="loader" id="table-loader"></div>
                <table id="admin-table" style="display:none">
                    <thead>
                        <tr>
                            <th>Aperçu</th>
                            <th>Nom</th>
                            <th>Catégorie</th>
                            <th>Prix</th>
                            <th>Livraison</th>
                            <th>Stripe</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
                <div id="table-empty" style="display:none" class="table-empty">
                    <i class="fas fa-box-open"></i>
                    <p>Aucun produit. Ajoutez-en un depuis le formulaire.</p>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toast-msg"></span></div>

<script>
const SUPABASE_URL = 'https://ahvbjimxxkujbjvffibr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFodmJqaW14eGt1amJqdmZmaWJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NzYyNjQsImV4cCI6MjA5NjU1MjI2NH0.gFYIIx_hO5Jwu0XTMdxzLw3tNdPFFwz6nq6VxVY5cts';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let editingId = null;
let deliveryType = 'digital';

// ─── AUTH ───
async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    const btn = document.getElementById('btn-login-submit');
    const errEl = document.getElementById('login-error');

    if (!email || !pass) { showLoginError('Email et mot de passe requis.'); return; }

    btn.disabled = true; btn.textContent = 'Connexion...';
    errEl.style.display = 'none';

    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });

    if (error) {
        showLoginError('Email ou mot de passe incorrect.');
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:6px"></i>Se connecter';
        return;
    }

    enterAdmin(data.user);
}

function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg; el.style.display = 'block';
}

async function doLogout() {
    await db.auth.signOut();
    document.getElementById('admin-app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
}

function enterAdmin(user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-app').style.display = 'block';
    document.getElementById('user-email').textContent = user.email;
    renderCategories();
    loadProducts();
}

// Vérifier session existante
(async function checkSession() {
    const { data: { session } } = await db.auth.getSession();
    if (session) enterAdmin(session.user);
})();

// ─── CATÉGORIES ───
function getCategories() {
    const stored = localStorage.getItem('dd_categories');
    return stored ? JSON.parse(stored) : ['LIVRE', 'VÊTEMENT', 'PROGRAMME', 'ACCESSOIRE'];
}

function renderCategories() {
    const cats = getCategories();
    const sel = document.getElementById('f-category');
    const current = sel.value;
    sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
    if (cats.includes(current)) sel.value = current;
}

function addCategory() {
    const name = prompt('Nom de la nouvelle catégorie :');
    if (!name || !name.trim()) return;
    const cats = getCategories();
    const formatted = name.trim().toUpperCase();
    if (!cats.includes(formatted)) {
        cats.push(formatted);
        localStorage.setItem('dd_categories', JSON.stringify(cats));
        renderCategories();
        document.getElementById('f-category').value = formatted;
    }
}

// ─── LIVRAISON ───
function setDelivery(type) {
    deliveryType = type;
    document.getElementById('opt-digital').classList.toggle('active', type === 'digital');
    document.getElementById('opt-physical').classList.toggle('active', type === 'physical');
    document.getElementById('delivery-link-group').style.display = type === 'digital' ? 'block' : 'none';
}

// ─── PRODUITS ───
async function loadProducts() {
    const { data, error } = await db.from('products').select('*').order('created_at', { ascending: false });
    if (error) { showToast('Erreur de chargement : ' + error.message, true); return; }
    products = data || [];
    renderTable();
    updateStats();
    document.getElementById('table-loader').style.display = 'none';
    document.getElementById('admin-table').style.display = products.length ? 'table' : 'none';
    document.getElementById('table-empty').style.display = products.length ? 'none' : 'block';
}

function updateStats() {
    const cats = [...new Set(products.map(p => p.category))];
    document.getElementById('stat-total').textContent = products.length;
    document.getElementById('stat-digital').textContent = products.filter(p => p.deliverytype === 'digital').length;
    document.getElementById('stat-physical').textContent = products.filter(p => p.deliverytype === 'physical').length;
    document.getElementById('stat-cats').textContent = cats.length;
    document.getElementById('product-count').textContent = `${products.length} produit${products.length !== 1 ? 's' : ''}`;
}

function renderTable() {
    const body = document.getElementById('table-body');
    if (!products.length) { body.innerHTML = ''; return; }
    body.innerHTML = products.map(p => `
        <tr>
            <td><img src="${p.image}" alt="" class="thumb" onerror="this.style.opacity='0.2'"></td>
            <td><div class="product-name-cell">${p.name}</div></td>
            <td><span class="cat-pill">${p.category}</span></td>
            <td class="price-cell">$${parseFloat(p.price).toFixed(2)}</td>
            <td><span class="delivery-pill">${p.deliverytype === 'digital' ? '<i class="fas fa-download"></i> Digital' : '<i class="fas fa-truck"></i> Physique'}</span></td>
            <td><span class="stripe-link" title="${p.stripepaymentlink || ''}">${(p.stripepaymentlink || '—').substring(0, 28)}${(p.stripepaymentlink || '').length > 28 ? '...' : ''}</span></td>
            <td>
                <div class="action-btns">
                    <button class="btn-edit" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-delete" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                </div>
            </td>
        </tr>`).join('');
}

// ─── FORMULAIRE ───
async function submitForm() {
    const name = document.getElementById('f-name').value.trim();
    const category = document.getElementById('f-category').value;
    const price = parseFloat(document.getElementById('f-price').value);
    const image = document.getElementById('f-image').value.trim();
    const stripepaymentlink = document.getElementById('f-stripe').value.trim();
    const description = document.getElementById('f-description').value.trim();
    const deliverylink = document.getElementById('f-delivery-link').value.trim();

    if (!name || !category || !price || !image || !stripepaymentlink) {
        showToast('Remplis tous les champs obligatoires (*).', true); return;
    }

    const payload = { name, category, price, image, stripepaymentlink, description, deliverytype: deliveryType, deliverylink: deliverylink || null };

    const btn = document.getElementById('btn-submit-form');
    btn.disabled = true; btn.textContent = editingId ? 'Mise à jour...' : 'Publication...';

    try {
        if (editingId) {
            const { error } = await db.from('products').update(payload).eq('id', editingId);
            if (error) throw error;
            showToast('Produit mis à jour avec succès !');
        } else {
            const { error } = await db.from('products').insert([payload]);
            if (error) throw error;
            showToast('Produit publié sur la boutique !');
        }
        cancelEdit();
        await loadProducts();
    } catch (e) {
        showToast('Erreur : ' + e.message, true);
    }

    btn.disabled = false;
    btn.innerHTML = editingId ? '<i class="fas fa-save" style="margin-right:6px"></i>Enregistrer' : '<i class="fas fa-plus" style="margin-right:6px"></i>Publier sur la boutique';
}

function editProduct(id) {
    const p = products.find(x => String(x.id) === String(id));
    if (!p) return;
    editingId = id;

    document.getElementById('f-name').value = p.name;
    document.getElementById('f-category').value = p.category;
    document.getElementById('f-price').value = p.price;
    document.getElementById('f-image').value = p.image || '';
    document.getElementById('f-stripe').value = p.stripepaymentlink || '';
    document.getElementById('f-description').value = p.description || '';
    document.getElementById('f-delivery-link').value = p.deliverylink || '';

    setDelivery(p.deliverytype || 'digital');

    document.getElementById('form-section-label').textContent = 'Modifier le produit';
    const btn = document.getElementById('btn-submit-form');
    btn.classList.add('editing');
    btn.innerHTML = '<i class="fas fa-save" style="margin-right:6px"></i>Enregistrer les modifications';
    document.getElementById('btn-cancel-form').style.display = 'block';

    document.querySelector('.sidebar').scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
    editingId = null;
    document.getElementById('f-name').value = '';
    document.getElementById('f-category').value = getCategories()[0] || '';
    document.getElementById('f-price').value = '';
    document.getElementById('f-image').value = '';
    document.getElementById('f-stripe').value = '';
    document.getElementById('f-description').value = '';
    document.getElementById('f-delivery-link').value = '';
    setDelivery('digital');

    document.getElementById('form-section-label').textContent = 'Ajouter un produit';
    const btn = document.getElementById('btn-submit-form');
    btn.classList.remove('editing');
    btn.innerHTML = '<i class="fas fa-plus" style="margin-right:6px"></i>Publier sur la boutique';
    document.getElementById('btn-cancel-form').style.display = 'none';
}

async function deleteProduct(id) {
    const p = products.find(x => String(x.id) === String(id));
    if (!confirm(`Supprimer "${p?.name}" ? Cette action est irréversible.`)) return;
    const { error } = await db.from('products').delete().eq('id', id);
    if (error) { showToast('Erreur de suppression.', true); return; }
    showToast('Produit supprimé.');
    if (editingId === id) cancelEdit();
    await loadProducts();
}

// ─── IMPORT / EXPORT ───
function exportCatalog() {
    const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'catalogue_dave_deliscart.json';
    a.click();
}

function importCatalog(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
        try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error();
            const { error } = await db.from('products').upsert(data, { onConflict: 'id' });
            if (error) throw error;
            await loadProducts();
            showToast(`${data.length} produit(s) importé(s) avec succès.`);
        } catch { showToast('Fichier JSON invalide.', true); }
        input.value = '';
    };
    reader.readAsText(file);
}

// ─── TOAST ───
let toastTimer;
function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    const msgEl = document.getElementById('toast-msg');
    toast.className = 'toast' + (isError ? ' error' : '');
    toast.querySelector('i').className = 'fas ' + (isError ? 'fa-exclamation-circle' : 'fa-check-circle');
    msgEl.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

// Init delivery toggle
setDelivery('digital');
</script>
